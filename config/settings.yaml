# LLM Knowledge Base — 設定檔
# 複製此檔並以 .env 管理敏感金鑰，不要直接在此填入 API key

# LLM API 設定（ingest.py 使用，compile/lint/query 由 Claude Code Agent 處理）
llm:
  provider: anthropic          # anthropic | openai
  model: claude-sonnet-4-6     # claude-sonnet-4-6 | gpt-4o
  max_tokens: 4096
  temperature: 0.3             # 較低溫度確保內容一致性
  # api_key: 請設定環境變數 ANTHROPIC_API_KEY 或 OPENAI_API_KEY

# 路徑設定（相對於專案根目錄）
paths:
  raw: raw/
  wiki: wiki/
  concepts: wiki/concepts/
  derived: wiki/derived/
  queries: wiki/queries/
  compiled_index: .compiled_index.json

# 搜尋設定（scripts/search.py 使用）
search:
  default_mode: keyword        # keyword（本地 BM25，不需 LLM）
  top_k: 10

# Ingest 設定（scripts/ingest.py 使用）
ingest:
  default_type: article        # article | paper | repo | dataset
  dedup: true                  # 依 SHA-256 hash 去重

# Lint 設定（scripts/lint.py 結構檢查使用）
lint:
  fuzzy_match_threshold: 0.85  # 模糊比對相似度門檻（用於連結修復建議）

# GitHub 設定（wiki 輸出格式）
github:
  repo: ""                     # 填入 GitHub repo 路徑，如 "username/llm-knowledge-base"
  branch: main                 # wiki/ 所在的分支
  wiki_base_path: wiki/        # wiki 根目錄（相對於 repo 根目錄）
  link_format: relative        # relative（相對路徑，GitHub 可直接渲染）
