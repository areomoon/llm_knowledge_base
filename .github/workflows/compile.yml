name: Wiki Compile

on:
  workflow_dispatch:
    inputs:
      force:
        description: '強制重新編譯所有 raw/ 文件（忽略快取）'
        required: false
        default: 'false'
        type: boolean
      batch:
        description: '單次批次上限（0 = 無限制）'
        required: false
        default: '0'
        type: string
  schedule:
    # 每日 UTC 02:00（台灣時間 10:00）自動執行
    - cron: '0 2 * * *'

jobs:
  compile:
    name: Compile raw/ → wiki/
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build compile command
        id: build-cmd
        run: |
          CMD="python scripts/compile.py"
          if [ "${{ inputs.force }}" = "true" ]; then
            CMD="$CMD --force"
          fi
          if [ -n "${{ inputs.batch }}" ] && [ "${{ inputs.batch }}" != "0" ]; then
            CMD="$CMD --batch ${{ inputs.batch }}"
          fi
          echo "cmd=$CMD" >> $GITHUB_OUTPUT

      - name: Run compile
        run: ${{ steps.build-cmd.outputs.cmd }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Run lint after compile
        run: python scripts/lint.py --report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit wiki updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wiki/ .compiled_index.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: compile & lint wiki [$(date -u +%Y-%m-%d)]

            Auto-generated by compile.yml workflow
            Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>"
            git push
          fi
